<app-navbar></app-navbar>

<section class="page-hero">
  <div class="bg-text">BARBER</div>
  <div class="section-header">
    <span class="section-label">Nossa Equipe</span>
    <h1 class="section-title">Barbeiros</h1>
    <div class="gold-line"></div>
    <p class="section-desc">Profissionais especializados, com técnica, atenção aos detalhes e paixão pela arte da barbearia.</p>
  </div>

  <div class="barbers-grid">
    @for (b of barbeiros(); track b.id; let i = $index) {
      <article class="barber-card" [style.--delay]="(i * 0.08) + 's'">
        <div class="photo-wrap">
          <img [src]="b.fotoUrl" [alt]="'Foto de ' + b.nome" loading="lazy">
          <div class="photo-frame"></div>
        </div>
        <div class="info">
          <h3 class="barber-name">{{ b.nome }}</h3>
          <p class="barber-specialty">{{ b.especialidade }}</p>
          <div class="barber-stats">
            <div class="stat">
              <span class="stat-value">{{ b.anosEstudo }}</span>
              <span class="stat-label">Anos de estudo</span>
            </div>
            <div class="divider-v"></div>
            <div class="stat">
              <span class="stat-value">{{ b.instagram }}</span>
              <span class="stat-label">Instagram</span>
            </div>
          </div>
        </div>
      </article>
    }
  </div>
</section>
